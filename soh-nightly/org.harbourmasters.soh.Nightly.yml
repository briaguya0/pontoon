id: org.harbourmasters.soh.Nightly
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: soh-nightly

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # --device=all (not --device=input) because SDL3's libusb HIDAPI backend
  # accesses raw USB devices; flatpak has no finer-grained USB knob.
  - --device=all
  - --socket=pulseaudio
  - --share=network
  - --talk-name=org.freedesktop.portal.Desktop

cleanup:
  - /include
  - /share/man
  - /share/doc
  - /share/pkgconfig
  - /share/cmake
  - /share/vim
  - /lib/pkgconfig
  - /lib/cmake
  - '*.a'
  - '*.la'
  - /bin/lsb_release
  # SoH's CMake INSTALL rules place these at /app root; our post-install
  # puts the canonical copies under /app/lib/soh-nightly. Drop the duplicates.
  - /soh.elf
  - /soh.o2r
  - /gamecontrollerdb.txt
  - /assets

modules:
  - name: lsb-release-stub
    buildsystem: simple
    build-commands:
      - install -Dm755 lsb_release ${FLATPAK_DEST}/bin/lsb_release
    sources:
      - type: file
        path: lsb_release

  - name: libzip
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://github.com/nih-at/libzip/releases/download/v1.10.1/libzip-1.10.1.tar.gz
        sha256: 9669ae5dfe3ac5b3897536dc8466a874c8cf2c0e3b1fdd08d75b273884299363

  - name: nlohmann-json
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DJSON_BuildTests=OFF
    sources:
      - type: archive
        url: https://github.com/nlohmann/json/archive/refs/tags/v3.12.0.tar.gz
        sha256: 4b92eb0c06d10683f7447ce9406cb97cd4b453be18d7279320f7b2f025c10187

  - name: tinyxml2
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://github.com/leethomason/tinyxml2/archive/refs/tags/10.0.0.tar.gz
        sha256: 3bdf15128ba16686e69bce256cc468e76c7b94ff2c7f391cc5ec09e40bff3839

  - name: spdlog
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DSPDLOG_BUILD_SHARED=ON
      - -DSPDLOG_BUILD_EXAMPLE=OFF
      - -DSPDLOG_BUILD_TESTS=OFF
    sources:
      - type: archive
        url: https://github.com/gabime/spdlog/archive/refs/tags/v1.17.0.tar.gz
        sha256: d8862955c6d74e5846b3f580b1605d2428b11d97a410d86e2fb13e857cd3a744

  # sonic is an espeak-ng dep; pinning to the commit espeak-ng's FetchContent
  # would otherwise pull. Adding it as a /app module means espeak-ng's
  # find_library(SONIC_LIB sonic) succeeds and the FetchContent branch is skipped.
  - name: sonic
    buildsystem: simple
    build-commands:
      - make PREFIX=${FLATPAK_DEST}
      - make install PREFIX=${FLATPAK_DEST}
    sources:
      - type: git
        url: https://github.com/waywardgeek/sonic.git
        commit: fbf75c3d6d846bad3bb3d456cbc5d07d9fd8c104

  - name: espeak-ng
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DENABLE_TESTS=OFF
    sources:
      - type: archive
        url: https://github.com/espeak-ng/espeak-ng/archive/refs/tags/1.52.0.tar.gz
        sha256: bb4338102ff3b49a81423da8a1a158b420124b055b60fa76cfb4b18677130a23

  # Replicates freedesktop-sdk 25.08's sdl3.bst exactly, plus SDL_HIDAPI_LIBUSB=ON
  # so GameCube adapters and other libusb-only controllers work. SoH still calls
  # SDL2; the runtime's sdl2-compat shim dlopens our SDL3 via /app/lib taking
  # precedence over /usr/lib in the search order.
  - name: sdl3
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DSDL_TEST_LIBRARY=OFF
      - -DSDL_TESTS=OFF
      - -DSDL_EXAMPLES=OFF
      - -DSDL_ALSA=OFF
      - -DSDL_OSS=OFF
      - -DSDL_SNDIO=OFF
      - -DSDL_WAYLAND=ON
      - -DSDL_WAYLAND_SHARED=OFF
      - -DSDL_RPATH=OFF
      - -DSDL_WAYLAND_LIBDECOR=ON
      - -DSDL_PIPEWIRE_SHARED=ON
      - -DSDL_HIDAPI_LIBUSB=ON
    sources:
      - type: git
        url: https://github.com/libsdl-org/SDL.git
        tag: release-3.2.30
        commit: f5e5f6588921eed3d7d048ce43d9eb1ff0da0ffc

  - name: soh
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_REMOTE_CONTROL=1
      - -DFETCHCONTENT_FULLY_DISCONNECTED=ON
      - -DFETCHCONTENT_SOURCE_DIR_IMGUI=/run/build/soh/_fetchcontent/imgui
      - -DFETCHCONTENT_SOURCE_DIR_STORMLIB=/run/build/soh/_fetchcontent/stormlib
      - -DFETCHCONTENT_SOURCE_DIR_LIBGFXD=/run/build/soh/_fetchcontent/libgfxd
      - -DFETCHCONTENT_SOURCE_DIR_THREADPOOL=/run/build/soh/_fetchcontent/threadpool
      - -DFETCHCONTENT_SOURCE_DIR_PRISM=/run/build/soh/_fetchcontent/prism
      - -DFETCHCONTENT_SOURCE_DIR_DR_LIBS=/run/build/soh/_fetchcontent/dr_libs
      - -DFETCHCONTENT_SOURCE_DIR_MONOCYPHER=/run/build/soh/_fetchcontent/monocypher
    post-install:
      - install -Dm755 ../soh-nightly.sh ${FLATPAK_DEST}/bin/soh-nightly
      - install -Dm755 ./soh/soh.elf ${FLATPAK_DEST}/lib/soh-nightly/soh.elf
      - install -Dm644 ./soh/soh.o2r ${FLATPAK_DEST}/lib/soh-nightly/soh.o2r
      - install -Dm644 ./gamecontrollerdb.txt ${FLATPAK_DEST}/lib/soh-nightly/gamecontrollerdb.txt
      - cp -r ./soh/assets ${FLATPAK_DEST}/lib/soh-nightly/assets
      - install -Dm644 ../org.harbourmasters.soh.Nightly.metainfo.xml ${FLATPAK_DEST}/share/metainfo/org.harbourmasters.soh.Nightly.metainfo.xml
      - install -Dm644 ../org.harbourmasters.soh.Nightly.desktop ${FLATPAK_DEST}/share/applications/org.harbourmasters.soh.Nightly.desktop
      - install -Dm644 ../icons/org.harbourmasters.soh.Nightly.16x16.png ${FLATPAK_DEST}/share/icons/hicolor/16x16/apps/org.harbourmasters.soh.Nightly.png
      - install -Dm644 ../icons/org.harbourmasters.soh.Nightly.32x32.png ${FLATPAK_DEST}/share/icons/hicolor/32x32/apps/org.harbourmasters.soh.Nightly.png
      - install -Dm644 ../icons/org.harbourmasters.soh.Nightly.64x64.png ${FLATPAK_DEST}/share/icons/hicolor/64x64/apps/org.harbourmasters.soh.Nightly.png
      - install -Dm644 ../icons/org.harbourmasters.soh.Nightly.128x128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/org.harbourmasters.soh.Nightly.png
      - install -Dm644 ../icons/org.harbourmasters.soh.Nightly.256x256.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/org.harbourmasters.soh.Nightly.png
      - install -Dm644 ../icons/org.harbourmasters.soh.Nightly.512x512.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/org.harbourmasters.soh.Nightly.png
    sources:
      - type: git
        url: https://github.com/HarbourMasters/Shipwright.git
        branch: develop
      - type: file
        path: soh-nightly.sh
      - type: file
        path: org.harbourmasters.soh.Nightly.metainfo.xml
      - type: file
        path: org.harbourmasters.soh.Nightly.desktop
      - type: dir
        path: icons
        dest: icons
      # libultraship's FetchContent deps, pre-staged because flatpak-builder
      # disables network during build. CMake reads these via FETCHCONTENT_SOURCE_DIR_*.
      # Verify with: diff <(scripts/show-soh-pins.py develop) <(scripts/show-manifest-pins.py soh-nightly/org.harbourmasters.soh.Nightly.yml)
      - type: git
        url: https://github.com/ocornut/imgui.git
        tag: v1.91.9b-docking
        dest: _fetchcontent/imgui
      - type: git
        url: https://github.com/ladislav-zezula/StormLib.git
        tag: v9.25
        dest: _fetchcontent/stormlib
      - type: git
        url: https://github.com/glankk/libgfxd.git
        commit: 008f73dca8ebc9151b205959b17773a19c5bd0da
        dest: _fetchcontent/libgfxd
      - type: git
        url: https://github.com/bshoshany/thread-pool.git
        tag: v4.1.0
        dest: _fetchcontent/threadpool
      - type: git
        url: https://github.com/KiritoDv/prism-processor.git
        commit: 1de054450e7b3c5f777d2e3dfcb228ad120c329d
        dest: _fetchcontent/prism
      - type: git
        url: https://github.com/mackron/dr_libs.git
        commit: da35f9d6c7374a95353fd1df1d394d44ab66cf01
        dest: _fetchcontent/dr_libs
      - type: git
        url: https://github.com/LoupVaillant/Monocypher.git
        commit: 0d85f98c9d9b0227e42cf795cb527dff372b40a4
        dest: _fetchcontent/monocypher
      # stb_image.h is fetched via raw file(DOWNLOAD), not FetchContent;
      # we stage it here and a small patch swaps the URL for a local copy.
      - type: file
        url: https://github.com/nothings/stb/raw/0bc88af4de5fb022db643c2d8e549a0927749354/stb_image.h
        sha256: c54b15a689e6a1f32c75e2ec23afa442e3e0e37e894b73c1974d08679b20dd5c
        dest: _fetchcontent
      - type: patch
        path: stb-image-skip-download.patch
      # gamecontrollerdb.txt is similarly curl'd at configure time; same fix.
      # SoH CMake fetches master HEAD at build time, so the sha256 below
      # is stamped in by scripts/roll-gamecontrollerdb.sh before flatpak-builder
      # runs (invoked from .github/workflows/flatter.yml).
      - type: file
        url: https://raw.githubusercontent.com/mdqinc/SDL_GameControllerDB/master/gamecontrollerdb.txt
        sha256: PLACEHOLDER_GCDB_SHA256
        dest: _fetchcontent
      - type: patch
        path: gamecontrollerdb-skip-download.patch
      # SoH CMake decouples GenerateSohOtr from the default build so SoH CI
      # can produce it in a separate job. We build everything in one pass, so
      # we wire it back into the regular dependency graph.
      - type: patch
        path: generate-sohotr-as-dep.patch
      # libultraship's own ImGui and StormLib patches normally run via CMake's
      # PATCH_COMMAND, but FETCHCONTENT_SOURCE_DIR skips that step. Apply them
      # by hand against the pre-staged sources.
      - type: shell
        commands:
          - (cd _fetchcontent/imgui && git apply ../../libultraship/cmake/dependencies/patches/imgui-fixes-and-config.patch)
          - (cd _fetchcontent/stormlib && git apply ../../libultraship/cmake/dependencies/patches/stormlib-optimizations.patch)
