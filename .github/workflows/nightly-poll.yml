name: Nightly Poll

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Get develop tip SHA
        id: develop
        run: echo "sha=$(gh api repos/HarbourMasters/Shipwright/commits/develop --jq .sha)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if flatter is running
        id: gate
        run: |
          RUNNING=$(gh api "repos/${{ github.repository }}/actions/workflows/flatter.yml/runs?status=in_progress" --jq '.total_count')
          if [ "$RUNNING" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "flatter already in progress, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if changed
        if: steps.gate.outputs.skip == 'false'
        id: check
        run: |
          CURRENT="${{ steps.develop.outputs.sha }}"
          STORED="${{ vars.LAST_NIGHTLY_SHA }}"
          if [ "$CURRENT" != "$STORED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "develop tip: $CURRENT (last built: ${STORED:-none})"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "no change since last build ($STORED)"
          fi

      - name: Trigger build
        if: steps.check.outputs.changed == 'true'
        run: gh workflow run flatter.yml --ref main --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
