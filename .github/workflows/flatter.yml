name: Flatter

on:
  workflow_dispatch:

jobs:
  flatter:
    name: Flatter
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/andyholmes/flatter/freedesktop:25.08
      options: --privileged

    strategy:
      matrix:
        arch: [x86_64] # [x86_64, aarch64]
      fail-fast: false
      # Only one job at a time can use the shared repository cache
      max-parallel: 1

    steps:
      # Checkout a repository with Flatpak manifests
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          submodules: true

      - name: Setup QEMU
        if: ${{ matrix.arch == 'aarch64' }}
        id: qemu
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: arm64

      - name: Setup GPG
        id: gpg
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      # Generate a CNAME file on-the-fly for a configured host
      - name: Generate CNAME
        run: |
          echo "pontoon.briaguya.dev" > CNAME

      - name: Build
        uses: andyholmes/flatter@ba9d3856bb0e59b43ba4684fe72128003f1b7706 # main HEAD as of 2026-06-16
        with:
          files: |
            soh/org.harbourmasters.soh.yml
          arch: ${{ matrix.arch }}
          gpg-sign: ${{ steps.gpg.outputs.fingerprint }}
          upload-bundles: true
          # We assemble the Pages artifact ourselves so we can inject
          # SuggestedRemoteName into the generated .flatpakrepo. Track upstream
          # support at <flatter issue url> and revert when it lands.
          upload-pages-artifact: false

      - name: Assemble Pages artifact
        run: |
          # Inject SuggestedRemoteName so GUI tools (Warehouse etc.) use
          # "pontoon" instead of the URL basename "index" when adding the remote.
          sed -i '/^Url=/a SuggestedRemoteName=pontoon' repo/index.flatpakrepo
          cp CNAME default.css index.html repo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: repo

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: flatter
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5